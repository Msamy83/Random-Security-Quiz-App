<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Security Quiz Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.1) 10px,
                rgba(255, 255, 255, 0.1) 20px
            );
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateX(-100px) translateY(-100px); }
            100% { transform: translateX(100px) translateY(100px); }
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 40px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .setup-screen {
            text-align: center;
        }

        .setup-screen h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .question-count {
            margin: 30px 0;
        }

        .question-count label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
        }

        .slider-container {
            position: relative;
            margin: 20px 0;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            appearance: none;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #4facfe;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(79, 172, 254, 0.3);
        }

        .slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #4facfe;
            cursor: pointer;
            border: none;
        }

        .slider-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4facfe;
            margin-top: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background-image: linear-gradient(
                -45deg,
                rgba(255, 255, 255, .2) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, .2) 50%,
                rgba(255, 255, 255, .2) 75%,
                transparent 75%,
                transparent
            );
            background-size: 50px 50px;
            animation: move 2s linear infinite;
        }

        @keyframes move {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .question-screen h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .question {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #4facfe;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .question h4 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: #4facfe;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }

        .option.selected {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
            transform: scale(1.02);
        }

        .option.correct {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            border-color: #56ab2f;
            animation: pulse 0.6s ease-in-out;
        }

        .option.incorrect {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            border-color: #ff416c;
            animation: shake 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .explanation {
            background: #e8f4f8;
            border: 1px solid #4facfe;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
            }
            to {
                opacity: 1;
                max-height: 200px;
                padding-top: 20px;
                padding-bottom: 20px;
            }
        }

        .explanation h5 {
            color: #4facfe;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .explanation p {
            color: #555;
            line-height: 1.6;
        }

        .result-screen {
            text-align: center;
        }

        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .score-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: twinkle 3s linear infinite;
        }

        @keyframes twinkle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .score-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .score-text {
            font-size: 1.3em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .grade-badge {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .grade-perfect { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .grade-excellent { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .grade-good { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; }
        .grade-fair { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; }
        .grade-poor { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float-particle 6s linear infinite;
        }

        @keyframes float-particle {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                width: 95%;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 20px;
            }
            
            .options {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1>🔐 Security Quiz Pro</h1>
            <p>Test Your Cybersecurity Knowledge</p>
        </div>
        
        <div class="content">
            <!-- Setup Screen -->
            <div class="screen active" id="setupScreen">
                <div class="setup-screen">
                    <h2>Ready to Test Your Security Skills?</h2>
                    <div class="question-count">
                        <label for="questionSlider">Number of Questions:</label>
                        <div class="slider-container">
                            <input type="range" id="questionSlider" class="slider" min="1" max="15" value="5">
                            <div class="slider-value" id="sliderValue">5</div>
                        </div>
                    </div>
                    <button class="btn" onclick="startQuiz()">Start Quiz 🚀</button>
                </div>
            </div>

            <!-- Loading Screen -->
            <div class="screen" id="loadingScreen">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
                <p style="text-align: center; margin-top: 20px; color: #666;">Preparing your personalized quiz...</p>
            </div>

            <!-- Question Screen -->
            <div class="screen" id="questionScreen">
                <div class="question-screen">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <h3 id="questionNumber">Question 1 of 5</h3>
                    <div class="question">
                        <h4 id="questionText"></h4>
                        <div class="options" id="optionsContainer"></div>
                    </div>
                    <div id="explanationContainer"></div>
                    <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">Next Question ➡️</button>
                </div>
            </div>

            <!-- Result Screen -->
            <div class="screen" id="resultScreen">
                <div class="result-screen">
                    <h2>🎉 Quiz Complete!</h2>
                    <div class="score-display">
                        <div class="score-number" id="finalScore">0/0</div>
                        <div class="score-text" id="finalPercentage">0%</div>
                    </div>
                    <div class="grade-badge" id="gradeBadge"></div>
                    <div style="margin-top: 30px;">
                        <button class="btn" onclick="resetQuiz()">Play Again 🔄</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Question Bank
        const QUESTIONS = [
            {
                question: "What does 'SQL Injection' allow an attacker to do?",
                options: [
                    "Crash the web server",
                    "Execute arbitrary SQL commands on the database",
                    "Intercept network traffic",
                    "Crack password hashes"
                ],
                correct: 1,
                explanation: "SQL Injection lets attackers manipulate database queries by injecting malicious SQL code."
            },
            {
                question: "Which protocol is used to securely transfer files over SSH?",
                options: ["FTP", "TFTP", "SFTP", "HTTP"],
                correct: 2,
                explanation: "SFTP (SSH File Transfer Protocol) encrypts both commands and data using SSH."
            },
            {
                question: "What is a 'Zero-Day' vulnerability?",
                options: [
                    "A vulnerability with no patch available yet",
                    "A bug that causes system to reboot every day",
                    "A malware that activates at midnight",
                    "A denial-of-service attack"
                ],
                correct: 0,
                explanation: "A Zero-Day is a flaw unknown to the vendor, meaning 'zero days' have passed to fix it."
            },
            {
                question: "Which type of attack involves sending excessive traffic to crash a service?",
                options: ["Phishing", "Man-in-the-Middle", "Denial of Service (DoS)", "SQL Injection"],
                correct: 2,
                explanation: "A DoS attack floods a target with traffic to make it unavailable to users."
            },
            {
                question: "What is the purpose of a firewall?",
                options: [
                    "Speed up internet connection",
                    "Monitor and control incoming/outgoing network traffic",
                    "Encrypt hard disk data",
                    "Scan for viruses in files"
                ],
                correct: 1,
                explanation: "A firewall enforces security rules on network traffic based on a defined rule set."
            },
            {
                question: "What does 'HTTPS' provide over 'HTTP'?",
                options: [
                    "Faster page loading",
                    "Encrypted communication using TLS/SSL",
                    "Larger file transfer support",
                    "Better SEO ranking only"
                ],
                correct: 1,
                explanation: "HTTPS uses TLS/SSL to encrypt data between browser and server, ensuring confidentiality."
            },
            {
                question: "Which hashing algorithm is considered BROKEN and should NOT be used for passwords?",
                options: ["bcrypt", "SHA-256", "MD5", "Argon2"],
                correct: 2,
                explanation: "MD5 is cryptographically broken — it's vulnerable to collision attacks and rainbow tables."
            },
            {
                question: "What is 'Phishing'?",
                options: [
                    "A network scanning technique",
                    "Tricking users into revealing sensitive info via fake communications",
                    "Brute-forcing login pages",
                    "Exploiting buffer overflow vulnerabilities"
                ],
                correct: 1,
                explanation: "Phishing uses deceptive emails/sites to steal credentials, credit cards, or personal data."
            },
            {
                question: "What does 'MFA' stand for in cybersecurity?",
                options: [
                    "Malware Free Authentication",
                    "Multi-Factor Authentication",
                    "Managed Firewall Access",
                    "Multiple File Authorization"
                ],
                correct: 1,
                explanation: "MFA requires two or more verification factors, making unauthorized access much harder."
            },
            {
                question: "What is a 'Man-in-the-Middle' (MitM) attack?",
                options: [
                    "Attacker physically sits between two computers",
                    "Attacker secretly intercepts and relays communication between two parties",
                    "Attacker sends spam emails to both parties",
                    "Attacker installs malware on a middle server"
                ],
                correct: 1,
                explanation: "In a MitM attack, the attacker secretly relays and possibly alters communication."
            },
            {
                question: "Which command in Linux shows open network ports?",
                options: ["ls -la", "netstat -tuln", "chmod 777", "ping localhost"],
                correct: 1,
                explanation: "`netstat -tuln` lists all listening TCP/UDP ports without resolving hostnames."
            },
            {
                question: "What is 'Ransomware'?",
                options: [
                    "Software that monitors employee activity",
                    "Malware that encrypts files and demands payment for decryption",
                    "A type of antivirus tool",
                    "Software used to bypass firewalls"
                ],
                correct: 1,
                explanation: "Ransomware encrypts victim's data and demands a ransom (often in crypto) for the decryption key."
            },
            {
                question: "What is the principle of 'Least Privilege'?",
                options: [
                    "Give admin rights to all users for efficiency",
                    "Users/systems should only have the minimum access needed",
                    "Disable all user accounts by default",
                    "Limit internet speed for non-admin users"
                ],
                correct: 1,
                explanation: "Least Privilege reduces attack surface by limiting what each user/process can access."
            },
            {
                question: "Which tool is commonly used for network packet analysis?",
                options: ["Nmap", "Metasploit", "Wireshark", "John the Ripper"],
                correct: 2,
                explanation: "Wireshark is a network protocol analyzer that captures and inspects packets in real time."
            },
            {
                question: "What does 'CIA Triad' stand for in information security?",
                options: [
                    "Cyber Intelligence Agency",
                    "Confidentiality, Integrity, Availability",
                    "Control, Inspect, Authorize",
                    "Central Information Access"
                ],
                correct: 1,
                explanation: "The CIA Triad is the core model of information security: keep data secret, accurate, and accessible."
            }
        ];

        // Game State
        let currentQuiz = [];
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 5;
        let answered = false;

        // DOM Elements
        const screens = {
            setup: document.getElementById('setupScreen'),
            loading: document.getElementById('loadingScreen'),
            question: document.getElementById('questionScreen'),
            result: document.getElementById('resultScreen')
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            setupSlider();
        });

        function setupSlider() {
            const slider = document.getElementById('questionSlider');
            const sliderValue = document.getElementById('sliderValue');
            
            slider.addEventListener('input', function() {
                sliderValue.textContent = this.value;
            });
        }

        function createParticles() {
            const particlesContainer = document.querySelector('.particles');
            
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = Math.random() * 6 + 2 + 'px';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 6000);
            }

            setInterval(createParticle, 300);
        }

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function startQuiz() {
            totalQuestions = parseInt(document.getElementById('questionSlider').value);
            currentQuiz = getRandomQuestions(totalQuestions);
            currentQuestion = 0;
            score = 0;
            
            showScreen('loading');
            
            setTimeout(() => {
                showScreen('question');
                showQuestion();
            }, 1500);
        }

        function getRandomQuestions(count) {
            const shuffled = [...QUESTIONS].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function showQuestion() {
            answered = false;
            const question = currentQuiz[currentQuestion];
            
            // Update progress
            const progress = ((currentQuestion) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Update question info
            document.getElementById('questionNumber').textContent = 
                `Question ${currentQuestion + 1} of ${totalQuestions}`;
            document.getElementById('questionText').textContent = question.question;
            
            // Create options
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = `${String.fromCharCode(65 + index)}) ${option}`;
                optionDiv.onclick = () => selectAnswer(index, optionDiv);
                optionsContainer.appendChild(optionDiv);
            });
            
            // Clear explanation
            document.getElementById('explanationContainer').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectAnswer(selectedIndex, optionElement) {
            if (answered) return;
            
            answered = true;
            const question = currentQuiz[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            // Remove click handlers
            options.forEach(opt => opt.onclick = null);
            
            // Mark selected option
            optionElement.classList.add('selected');
            
            setTimeout(() => {
                // Show correct/incorrect
                if (selectedIndex === question.correct) {
                    optionElement.classList.remove('selected');
                    optionElement.classList.add('correct');
                    score++;
                } else {
                    optionElement.classList.remove('selected');
                    optionElement.classList.add('incorrect');
                    options[question.correct].classList.add('correct');
                }
                
                // Show explanation
                showExplanation(question.explanation);
                
                // Show next button
                setTimeout(() => {
                    document.getElementById('nextBtn').style.display = 'inline-block';
                }, 1000);
                
            }, 500);
        }

        function showExplanation(explanation) {
            const explanationContainer = document.getElementById('explanationContainer');
            explanationContainer.innerHTML = `
                <div class="explanation">
                    <h5>💡 Explanation:</h5>
                    <p>${explanation}</p>
                </div>
            `;
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion < totalQuestions) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            showScreen('result');
            
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('finalScore').textContent = `${score}/${totalQuestions}`;
            document.getElementById('finalPercentage').textContent = `${percentage}%`;
            
            const gradeBadge = document.getElementById('gradeBadge');
            
            if (percentage === 100) {
                gradeBadge.textContent = '🏆 Perfect Score! Security Expert!';
                gradeBadge.className = 'grade-badge grade-perfect';
            } else if (percentage >= 80) {
                gradeBadge.textContent = '🥇 Excellent! Strong security knowledge';
                gradeBadge.className = 'grade-badge grade-excellent';
            } else if (percentage >= 60) {
                gradeBadge.textContent = '🥈 Good effort! Keep studying';
                gradeBadge.className = 'grade-badge grade-good';
            } else if (percentage >= 40) {
                gradeBadge.textContent = '🥉 Fair. Review the basics again';
                gradeBadge.className = 'grade-badge grade-fair';
            } else {
                gradeBadge.textContent = '📚 Needs improvement. Keep learning!';
                gradeBadge.className = 'grade-badge grade-poor';
            }
        }

        function resetQuiz() {
            showScreen('setup');
            document.getElementById('questionSlider').value = 5;
            document.getElementById('sliderValue').textContent = '5';
        }
    </script>
</body>
</html>
